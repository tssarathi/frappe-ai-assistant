name: vyogo

networks:
  vyogo-net:
    driver: bridge

volumes:
  erpnext_sites:
  erpnext_logs:
  # MariaDB data dir. The vyogo/erpnext image bundles MariaDB inside the
  # erpnext container at /var/lib/mysql, so without this volume the entire
  # database is in the container's writable layer and any `docker compose up`
  # recreate (env change, image bump, etc.) wipes the site DB.
  erpnext_mysql:
  # Masks the host's frontend/node_modules during bootstrap. Vite 8+ uses
  # rolldown with per-platform native bindings; without this volume, the
  # bind-mounted host node_modules (e.g. darwin-arm64 from a Mac dev) lacks
  # the container's linux-x64 binding and `npm run build` fails with
  # MODULE_NOT_FOUND on @rolldown/binding-linux-*.
  frappe_ai_node_modules:

services:
  erpnext:
    # Pinned by digest so `make up` is reproducible across machines and over
    # time. The `sne-develop` tag floats; `make update` is the only place that
    # should re-pin. To bump, run:
    #   docker buildx imagetools inspect docker.io/vyogo/erpnext:sne-develop
    # and copy the index Digest into the line below.
    image: docker.io/vyogo/erpnext:sne-develop@sha256:a785eb57cbfce27450c68a2b246785689ef21a8e1b6e8166a3f0469907c73dab
    ports:
      - "${ERPNEXT_PORT:-8000}:8000"
    environment:
      SITES: "${SITE_NAME:-erpnext.local}"
      SITE_NAME: "${SITE_NAME:-erpnext.local}"
      ADMIN_PASSWORD: "${ERPNEXT_ADMIN_PASSWORD:-admin}"
      DEVELOPER_MODE: "1"
      # Server-side agent URL for frappe_ai's ai_query.py (test_connection / fallback
      # query). The doctype's `agent_url` is browser-facing (http://localhost:8484)
      # and unreachable from inside this container; this env points the same code at
      # the sibling agent container over the docker network.
      AI_AGENT_INTERNAL_URL: "http://agent:8484"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - erpnext_mysql:/var/lib/mysql
      - ./submodules/frappe_ai:/home/frappe/frappe-bench/apps/frappe_ai
    networks:
      - vyogo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  agent:
    build:
      context: ./submodules/frappe-ai-agent
    ports:
      - "${AGENT_PORT:-8484}:8484"
    environment:
      AI_AGENT_HOST: "0.0.0.0"
      AI_AGENT_PORT: "8484"
      AI_AGENT_WORKERS: "4"
      AI_AGENT_CORS_ORIGINS: '["http://localhost:${ERPNEXT_PORT:-8000}"]'
      AI_AGENT_LLM_PROVIDER: "${LLM_PROVIDER:-ollama}"
      AI_AGENT_LLM_BASE_URL: "${LLM_BASE_URL}"
      AI_AGENT_LLM_API_KEY: "${LLM_API_KEY}"
      AI_AGENT_LLM_MODEL: "${LLM_MODEL}"
      AI_AGENT_LLM_TEMPERATURE: "0.7"
      AI_AGENT_LLM_MAX_TOKENS: "4096"
      AI_AGENT_MCP_SERVER_URL: "http://mcp:8080/mcp"
      AI_AGENT_FRAPPE_URL: "http://erpnext:8000"
      AI_AGENT_LOG_LEVEL: "${LOG_LEVEL:-info}"
      AI_AGENT_LOG_FORMAT: "json"
    depends_on:
      erpnext:
        condition: service_healthy
      mcp:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
    networks:
      - vyogo-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Override the image's healthcheck: the image's HEALTHCHECK calls `python`
    # (system) which lacks httpx; only /app/.venv/bin/python has it.
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import httpx; httpx.get('http://localhost:8484/health').raise_for_status()"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  mcp:
    build:
      context: ./submodules/frappe-mcp-server
    # No ports published: mcp is internal-only. Uncomment for debugging.
    # ports:
    #   - "8080:8080"
    environment:
      FRAPPE_BASE_URL: "http://erpnext:8000"
      # API key/secret blank — sid cookie is forwarded per-request.
      FRAPPE_API_KEY: ""
      FRAPPE_API_SECRET: ""
      LLM_BASE_URL: "${LLM_BASE_URL}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "${LLM_MODEL}"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./configs/mcp/config.yaml:/app/config.yaml:ro
    depends_on:
      erpnext:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    networks:
      - vyogo-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  bootstrap:
    build:
      context: ./bootstrap
    environment:
      SITE_NAME: "${SITE_NAME:-erpnext.local}"
      ERPNEXT_URL: "http://erpnext:8000"
      AGENT_URL_DEFAULT: "http://localhost:${AGENT_PORT:-8484}"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - ./submodules/frappe_ai:/home/frappe/frappe-bench/apps/frappe_ai
      # See volume comment above: keep node_modules out of the bind mount.
      - frappe_ai_node_modules:/home/frappe/frappe-bench/apps/frappe_ai/frontend/node_modules
    depends_on:
      erpnext:
        condition: service_healthy
    networks:
      - vyogo-net
    restart: "no"
