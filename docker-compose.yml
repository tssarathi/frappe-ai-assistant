name: vyogo

networks:
  vyogo-net:
    driver: bridge

volumes:
  erpnext_sites:
  erpnext_logs:

services:
  erpnext:
    image: docker.io/vyogo/erpnext:sne-version-15
    ports:
      - "${ERPNEXT_PORT:-8000}:8000"
    environment:
      SITES: "${SITE_NAME:-erpnext.local}"
      SITE_NAME: "${SITE_NAME:-erpnext.local}"
      ADMIN_PASSWORD: "${ERPNEXT_ADMIN_PASSWORD:-admin}"
      DEVELOPER_MODE: "1"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./submodules/frappe_ai:/home/frappe/frappe-bench/apps/frappe_ai
    networks:
      - vyogo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  agent:
    build:
      context: ./submodules/frappe-ai-agent
    ports:
      - "${AGENT_PORT:-8484}:8484"
    environment:
      AI_AGENT_HOST: "0.0.0.0"
      AI_AGENT_PORT: "8484"
      AI_AGENT_WORKERS: "4"
      AI_AGENT_CORS_ORIGINS: '["http://localhost:${ERPNEXT_PORT:-8000}"]'
      AI_AGENT_LLM_PROVIDER: "${LLM_PROVIDER:-openai}"
      AI_AGENT_LLM_BASE_URL: "${LLM_BASE_URL}"
      AI_AGENT_LLM_API_KEY: "${LLM_API_KEY}"
      AI_AGENT_LLM_MODEL: "${LLM_MODEL}"
      AI_AGENT_LLM_TEMPERATURE: "0.7"
      AI_AGENT_LLM_MAX_TOKENS: "4096"
      AI_AGENT_MCP_SERVER_URL: "http://mcp:8080/mcp"
      AI_AGENT_FRAPPE_URL: "http://erpnext:8000"
      AI_AGENT_LOG_LEVEL: "${LOG_LEVEL:-info}"
      AI_AGENT_LOG_FORMAT: "json"
    depends_on:
      erpnext:
        condition: service_healthy
      mcp:
        condition: service_started
    networks:
      - vyogo-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mcp:
    build:
      context: ./submodules/frappe-mcp-server
    # No ports published: mcp is internal-only. Uncomment for debugging.
    # ports:
    #   - "8080:8080"
    environment:
      FRAPPE_BASE_URL: "http://erpnext:8000"
      # API key/secret blank — sid cookie is forwarded per-request.
      FRAPPE_API_KEY: ""
      FRAPPE_API_SECRET: ""
      LLM_BASE_URL: "${LLM_BASE_URL}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "${LLM_MODEL}"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./configs/mcp/config.yaml:/app/config.yaml:ro
    depends_on:
      erpnext:
        condition: service_healthy
    networks:
      - vyogo-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
